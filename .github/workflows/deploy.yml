name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx astro build
        env:
          SITE_URL: https://thatpentesterguy-blog.pages.dev
          PUBLIC_GITHUB_HANDLE: thatpentesterguy
          PUBLIC_GITHUB_REPO: security-blog
          PUBLIC_TWITTER_HANDLE: atulkjaiswal

      - name: Generate Pagefind search index
        run: npx pagefind --site dist --output-subdir _pagefind

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thatpentesterguy-blog
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
